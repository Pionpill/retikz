e="central" fill="currentColor"><tspan x="-18" dy="0">−1</tspan></text></g><path d="M -3 50 L 3 50" fill="none" stroke="currentColor" stroke-width="1"></path><g><rect x="-33.4" y="50.6" width="30.8" height="18.8" fill="transparent" stroke="none" stroke-width="1"></rect><text x="-18" y="60" font-size="14" text-anchor="middle" dominant-baseline="central" fill="currentColor"><tspan x="-18" dy="0">−1/2</tspan></text></g><path d="M -3 -50 L 3 -50" fill="none" stroke="currentColor" stroke-width="1"></path><g><rect x="-29.51" y="-49.4" width="23.03" height="18.8" fill="transparent" stroke="none" stroke-width="1"></rect><text x="-18" y="-40" font-size="14" text-anchor="middle" dominant-baseline="central" fill="currentColor"><tspan x="-18" dy="0">1/2</tspan></text></g><path d="M -3 -100 L 3 -100" fill="none" stroke="currentColor" stroke-width="1"></path><g><rect x="-22.88" y="-99.4" width="9.77" height="18.8" fill="transparent" stroke="none" stroke-width="1"></rect><text x="-18" y="-90" font-size="14" text-anchor="middle" dominant-baseline="central" fill="currentColor"><tspan x="-18" dy="0">1</tspan></text></g><path d="M 30 0 A 30 30 0 0 0 25.98 -15 L 0 0 Z" fill="lightgray" stroke="green" stroke-width="1"></path><g><rect x="16.23" y="-15.09" width="10.04" height="18.8" fill="transparent" stroke="none" stroke-width="1"></rect><text x="21.25" y="-5.69" font-size="14" font-family="&quot;Latin Modern Math&quot;, &quot;STIX Two Math&quot;, &quot;Cambria Math&quot;, &quot;Times New Roman&quot;, serif" font-style="italic" text-anchor="middle" dominant-baseline="central" fill="green"><tspan x="21.25" dy="0">α</tspan></text></g><path d="M 86.6 -50 L 86.6 0" fill="none" stroke="red" stroke-width="2"></path><text x="82.6" y="-25" font-size="14" text-anchor="end" dominant-baseline="central" fill="currentColor"><tspan x="82.6" dy="0">sin α</tspan></text><path d="M 86.6 0 L 0 0" fill="none" stroke="dodgerblue" stroke-width="2"></path><text x="43.3" y="4" font-size="14" text-anchor="middle" dominant-baseline="text-before-edge" fill="currentColor"><tspan x="43.3" dy="0">cos α</tspan></text><path d="M 100 0 L 100 -57.74" fill="none" stroke="darkorange" stroke-width="2"></path><text x="104" y="-28.87" font-size="14" text-anchor="start" dominant-baseline="central" fill="currentColor"><tspan x="104" dy="0">tan α = sin α / cos α</tspan></text><path d="M 0 0 L 100 -57.74" fill="none" stroke="currentColor" stroke-width="1"></path><g><rect x="283.27" y="-61.2" width="193.46" height="142.4" fill="transparent" stroke="lightgray" stroke-width="1" stroke-dasharray="4 2" rx="6" ry="6"></rect><text x="293.27" y="10" font-size="14" text-anchor="start" dominant-baseline="central" fill="currentColor"><tspan x="293.27" dy="-58.800000000000004" fill="green">angle α = 30°</tspan><tspan x="293.27" dy="16.8">(π/6 in radians)</tspan><tspan x="293.27" dy="16.8" fill="red">sin α = 1/2</tspan><tspan x="293.27" dy="16.8">(length of red line)</tspan><tspan x="293.27" dy="16.8" fill="dodgerblue">cos α = √3/2</tspan><tspan x="293.27" dy="16.8">(length of dodgerblue line)</tspan><tspan x="293.27" dy="16.8" fill="darkorange">tan α = 1/√3</tspan><tspan x="293.27" dy="16.8">(length of darkorange line)</tspan></text></g></svg>
